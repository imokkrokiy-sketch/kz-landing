<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ваш возраст?</title>

  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#f4f4f6;
      min-height:100vh;
      overflow:hidden;
      font-family:'Montserrat',sans-serif;
      color:#0d1733;
    }

    .container{
      max-width:430px;
      margin:0 auto;
      padding:42px 17px 40px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      font-family:'Lobster',cursive;
      font-size:33px;
      color:#9b1748;
      margin-bottom:58px;
    }

    .logo img{
      width:38px;
      height:38px;
      object-fit:contain;
    }

    h1{
      text-align:center;
      font-size:38px;
      line-height:1.1;
      font-weight:800;
      margin-bottom:14px;
      color:#09142f;
    }

    .sub{
      text-align:center;
      font-size:22px;
      font-weight:700;
      color:#858b98;
      margin-bottom:54px;
    }

    .btn{
      position:relative;
      width:100%;
      height:76px;
      border:none;
      border-radius:22px;
      overflow:hidden;
      cursor:pointer;
      margin-bottom:64px;
      color:white;
      font-size:21px;
      font-weight:800;

      background:linear-gradient(
        180deg,
        #b41b51 0%,
        #9a1443 100%
      );

      box-shadow:
        0 20px 34px rgba(167,16,71,0.26),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .btn::after{
      content:"";
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:45%;
      background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.07),
        rgba(255,255,255,0)
      );
      pointer-events:none;
    }

    .btn::before{
      content:"";
      position:absolute;
      top:-45%;
      left:-140%;
      width:58px;
      height:240%;
      background:rgba(255,255,255,0.22);
      transform:rotate(18deg);
      filter:blur(2px);
      animation:shine 3s infinite;
      pointer-events:none;
    }

    .btn.second{
      margin-top:-26px;
      background:linear-gradient(
        110deg,
        #a91549 0%,
        #a91549 50%,
        #c26a87 51%,
        #b94d70 93%,
        #a91549 100%
      );
    }

    .btn.second::before{
      animation-delay:1.1s;
    }

    @keyframes shine{
      0%{
        left:-140%;
      }
      100%{
        left:160%;
      }
    }

    .btn:active{
      transform:scale(0.985);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      Kezdesu
      <img src="https://cdn-icons-png.flaticon.com/512/742/742751.png">
    </div>

    <h1>Ваш возраст?</h1>

    <div class="sub">
      Сіздің жасыңыз?
    </div>

    <button class="btn" onclick="goOffer()">
      18–24 лет
    </button>

    <button class="btn second" onclick="goOffer()">
      25–65 лет
    </button>

  </div>

  <script>
    function goOffer(){
      window.location.href =
      "https://trk.g4trk.com/click/1804?pid=123852&offer_id=25";
    }
  </script>

</body>
</html>
