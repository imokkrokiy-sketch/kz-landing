<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kezdesu</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f5f5f7;
      min-height:100vh;
      overflow:hidden;
      color:#111827;
    }

    .container{
      max-width:430px;
      margin:0 auto;
      padding:28px 22px 40px;
    }

    .logo{
      font-size:34px;
      font-weight:700;
      color:#a1134b;
      font-style:italic;
      margin-bottom:45px;
    }

    .logo span{
      margin-left:6px;
    }

    h1{
      text-align:center;
      font-size:56px;
      font-weight:800;
      line-height:1;
      margin-bottom:12px;
    }

    .sub{
      text-align:center;
      color:#8d93a1;
      font-size:22px;
      font-weight:700;
      margin-bottom:55px;
    }

    .btn{
      position:relative;
      width:100%;
      height:88px;
      border:none;
      border-radius:24px;
      margin-bottom:34px;
      overflow:hidden;
      cursor:pointer;

      background:linear-gradient(
        180deg,
        #c71c5b 0%,
        #9d1245 100%
      );

      color:white;
      font-size:24px;
      font-weight:800;

      box-shadow:
        0 18px 35px rgba(175, 17, 74, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.15);

      transition:0.2s;
    }

    .btn:active{
      transform:scale(0.98);
    }

    /* движущийся зеркальный блик */
    .btn::before{
      content:"";
      position:absolute;
      top:-40%;
      left:-120%;
      width:70px;
      height:220%;
      background:rgba(255,255,255,0.28);

      transform:rotate(18deg);

      filter:blur(2px);

      animation:shine 2.8s infinite;
    }

    .btn.second{
      background:linear-gradient(
        120deg,
        #b2144f 0%,
        #a31147 42%,
        #d46a8e 50%,
        #b2144f 100%
      );
    }

    .btn.second::before{
      animation-delay:1s;
    }

    @keyframes shine{
      0%{
        left:-120%;
      }

      100%{
        left:160%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">
      Kezdesu <span>💋</span>
    </div>

    <h1>Ваш возраст?</h1>

    <div class="sub">
      Сіздің жасыңыз?
    </div>

    <button class="btn" onclick="goOffer()">
      18–24 лет
    </button>

    <button class="btn second" onclick="goOffer()">
      25–65 лет
    </button>

  </div>

  <script>
    function goOffer() {
      window.location.href =
      "https://trk.g4trk.com/click/1804?pid=123852&offer_id=25";
    }
  </script>

</body>
</html>
